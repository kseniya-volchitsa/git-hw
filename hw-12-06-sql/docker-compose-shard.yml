version: '3.8'

services:
  proxysql:
    image: proxysql/proxysql
    container_name: proxysql
    ports:
      - "6032:6032"  # Администрирование
      - "6033:6033"  # MySQL протокол
    volumes:
      - ./proxysql.cnf:/etc/proxysql.cnf
    depends_on:
      - shard1-master
      - shard2-master
      - shard3-master

  shard1-master:
    image: mysql:8.0
    container_name: shard1-master
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mydb
    ports:
      - "3307:3306"
    volumes:
      - ./shard1-data:/var/lib/mysql
    command: --server-id=11 --log-bin=mysql-bin

  shard1-slave:
    image: mysql:8.0
    container_name: shard1-slave
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mydb
    ports:
      - "3308:3306"
    volumes:
      - ./shard1-slave-data:/var/lib/mysql
    command: --server-id=12 --read-only=1

  shard2-master:
    image: mysql:8.0
    container_name: shard2-master
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mydb
    ports:
      - "3309:3306"
    volumes:
      - ./shard2-data:/var/lib/mysql
    command: --server-id=21 --log-bin=mysql-bin

  # Аналогично для shard2-slave, shard3-master, shard3-slave
