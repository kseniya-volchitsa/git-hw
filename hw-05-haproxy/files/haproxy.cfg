global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode http
    option httplog
    timeout connect 5000
    timeout client 50000
    timeout server 50000

frontend http-in
    bind *:8080
    mode http
    acl is_example1 hdr(host) -i example1.local
    acl is_example2 hdr(host) -i example2.local
    use_backend example1_backend if is_example1
    use_backend example2_backend if is_example2
    default_backend example1_backend

backend example1_backend
    mode http
    balance roundrobin
    server server1 127.0.0.1:8001 check
    server server2 127.0.0.1:8002 check

backend example2_backend
    mode http
    balance roundrobin
    server server3 127.0.0.1:8003 check
    server server4 127.0.0.1:8004 check
